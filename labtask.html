<html>
  <head>
    <link rel="stylesheet" type="text/css" href="./style/style.css" />
  </head>

  <body>
    <form> 
  <fieldset>
    
  <legend>Student Information</legend>

   <table border="0">
    <tr>
        <td>
            <label for="name">Full name (Text)</label><br>
            <input type="text" id="name" name="name" placeholder="Enter your full name"><br><br>
        </td>

        <td>
            <label for="email">Email Address</label><Br>
            <input type="email" id="email" name="email" placeholder=" your email@example.com"><br><br>  
        </td>
    </tr>

    <tr>
        <td>
            <label for="password">Password</label><br>
            <input type="text" id="password" name="password" placeholder=" Enter Secure Password" ><br><br>
        </td>

        <td>
            <label for="age">Age (Number)</label><Br>
            <input type="number" id="age" name="age" placeholder=" Enter Your age" ><br><br>
        </td>
    </tr>

    <tr>
        <td>
            <label for="edate">Experiment Date</label><br>
            <input type="date" id="edate" name="edate" ><br><br> 
        </td>

        <td>
            <label for="Phone">Phone Number (tel)</label><Br>
            <input type="tel" id="phone" name="phone" placeholder=" +880 XXXX XXXXXXX"><br><br> 
        </td>
    </tr>
   </table>

    <input type="submit" value="Submit">
    <input type="clear" value="clear">


  </fieldset>
  </form>
  </body>
